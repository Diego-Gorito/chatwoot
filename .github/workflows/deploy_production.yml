name: Deploy to Production (GHCR + EasyPanel)

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GITHUB_REPO: ghcr.io/${{ github.repository }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-22.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Update version in app.yml
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "Updating version to: $SHORT_SHA"
          sed -i "s/version: '.*'/version: '$SHORT_SHA'/" config/app.yml

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GitHub Container Registry
        id: build-ghcr
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.GITHUB_REPO }}:latest
            ${{ env.GITHUB_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build-ghcr.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:latest \
            -t ghcr.io/${{ github.repository }}:${{ github.sha }} \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          REPO="ghcr.io/${{ github.repository }}"
          docker buildx imagetools inspect ${REPO}:latest
          docker buildx imagetools inspect ${REPO}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - merge
    steps:
      - name: Trigger EasyPanel Deployment
        if: ${{ secrets.EASYPANEL_WEBHOOK_URL != '' }}
        run: |
          curl -X POST "${{ secrets.EASYPANEL_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "image": "ghcr.io/${{ github.repository }}:latest",
              "tag": "latest",
              "commit": "${{ github.sha }}"
            }'

      - name: Deployment notification
        run: |
          echo "✅ Docker image published to GHCR"
          echo "📦 Image: ghcr.io/${{ github.repository }}:latest"
          echo "🔖 Tag: ${{ github.sha }}"
          if [[ "${{ secrets.EASYPANEL_WEBHOOK_URL }}" != "" ]]; then
            echo "🚀 EasyPanel deployment triggered"
          else
            echo "⚠️  EasyPanel webhook not configured. Add EASYPANEL_WEBHOOK_URL secret to enable auto-deploy"
          fi
