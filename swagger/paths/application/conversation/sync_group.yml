tags:
  - Conversations
operationId: sync-group-of-a-conversation
summary: Sync Group
description: Syncs group information for a group conversation. The contact associated with the conversation must be a group contact. This triggers a sync with the channel provider (e.g., WhatsApp) to update group metadata and members.
security:
  - userApiKey: []
  - agentBotApiKey: []
responses:
  '200':
    description: Success
  '400':
    description: Bad request — contact is not a group
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
  '401':
    description: Unauthorized
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
  '404':
    description: Conversation not found
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
  '500':
    description: Internal server error — channel provider unavailable
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/bad_request_error'
